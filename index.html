<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; Play/Pause</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      /* Basic styling to make the button look nice and centered */
      #explode-button {
        display: block;
        margin: 20px auto;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background-color: #333;
        color: white;
        border: none;
        border-radius: 8px;
        transition: background-color 0.2s;
      }
      #explode-button:hover {
        background-color: #555;
      }
    </style>
  </head>
  <body>
    
    <model-viewer id="my-model" src="gen1.glb" ar animation-name="Explode" ar-modes="scene-viewer webxr quick-look" camera-controls poster="poster.webp" shadow-intensity="1" max-camera-orbit="110deg 90deg auto" camera-orbit="0deg 90deg auto">
      
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  

    <button id="explode-button">Play Explosion</button>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.2.0/model-viewer.min.js"></script>

    <script>
      // We wrap it in an event listener to ensure the HTML loads before the script runs
      document.addEventListener('DOMContentLoaded', () => {
        const modelViewer = document.querySelector('#my-model');
        const explodeButton = document.querySelector('#explode-button');

        explodeButton.addEventListener('click', () => {
          // Check if the animation is currently paused
          if (modelViewer.paused) {
            modelViewer.play();
            explodeButton.textContent = 'Pause Explosion';
          } else {
            modelViewer.pause();
            explodeButton.textContent = 'Play Explosion';
          }
        });
      });
    </script>
    
  </body>
</html>
